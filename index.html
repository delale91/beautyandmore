<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delale by More Than Beauty</title>

<style>
:root {
  --gold: #d8b26e;
  --white: #ffffff;
  --pink-light: #fbe7ef;
}

/* NEUER HINTERGRUND – DEIN BILD */
body {
  margin: 0;
  font-family: "Georgia", serif;
  color: var(--white);

  background-image: url('background.jpg'); /* <-- HIER DEIN BILD */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* CONTAINER */
.page {
  max-width: 1000px;
  margin: auto;
  padding: 30px;
}

/* HEADER */
.hero {
  text-align: center;
  margin-bottom: 30px;
}

.hero h1 {
  font-size: 3.8rem;
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.hero h2 {
  font-style: italic;
  color: var(--pink-light);
  font-size: 1.6rem;
}

/* TITEL */
.section-title {
  text-align: center;
  margin: 30px 0;
  font-size: 2rem;
  color: var(--white);
}

/* BOXEN */
.card {
  background: rgba(0,0,0,0.35);
  margin: 15px 0;
  border-radius: 15px;
  border: 1px solid rgba(216,178,110,0.5);
  backdrop-filter: blur(6px);
}

.card button {
  width: 100%;
  background: transparent;
  border: none;
  padding: 18px;
  color: var(--white);
  font-size: 1.2rem;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.card button span {
  color: var(--gold);
}

.content {
  display: none;
  padding: 10px 20px 20px;
  font-size: 1.1rem;
}

.price {
  color: var(--gold);
  font-weight: bold;
}

/* CONTACT */
.contact {
  margin-top: 40px;
  text-align: center;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  font-size: 1.1rem;
}

.instagram {
  background: linear-gradient(90deg,#833ab4,#fd1d1d,#fcb045);
  color: white;
}

.whatsapp {
  background: #25d366;
  color: white;
}
</style>
</head>

<body>

<div class="page">

<div class="hero">
  <h1>Delale</h1>
  <h2>by More Than Beauty</h2>
</div>

<h2 class="section-title">Meine Dienstleistungen</h2>

<div class="card" onclick="toggle(this)">
  <button>Wimpernverlängerung <span>+</span></button>
  <div class="content">
    <p>1:1 Technik - <span class="price">65€</span></p>
    <p>Volumen - <span class="price">80€</span></p>
    <p>Megavolumen - <span class="price">100€</span></p>
  </div>
</div>

<div class="card" onclick="toggle(this)">
  <button>Permanent Make-up <span>+</span></button>
  <div class="content">
    <p>Powder Brows - <span class="price">350€</span></p>
    <p>Ombre Brows - <span class="price">350€</span></p>
    <p>Lippen - <span class="price">350€</span></p>
  </div>
</div>

<div class="card" onclick="toggle(this)">
  <button>Aquafacial <span>+</span></button>
  <div class="content">
    <p class="price">Preis auf Anfrage</p>
  </div>
</div>

<div class="card" onclick="toggle(this)">
  <button>Microneedling <span>+</span></button>
  <div class="content">
    <p class="price">Preis auf Anfrage</p>
  </div>
</div>

<div class="contact">
  <a class="btn instagram" href="https://instagram.com/morethanbeautyu2025">Instagram</a>
  <a class="btn whatsapp" href="https://wa.me/4917682018696">WhatsApp</a>
</div>

</div>

<script>
function toggle(el){
  let c = el.querySelector(".content");
  c.style.display = c.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
